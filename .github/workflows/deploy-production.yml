# Deploy to Hostinger KVM VPS on push to main.
#
# GitHub → Settings → Secrets and variables → Actions:
#   SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, DEPLOY_PATH
#
# Optional repo variable (Settings → Variables): SSH_PORT (default 22)

name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-nimalsafari-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            export DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            cd "$DEPLOY_PATH"
            bash deploy/deploy.sh
