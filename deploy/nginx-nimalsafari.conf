# /etc/nginx/sites-available/nimalsafari
# Proxy HTTPS to Next.js (PM2 on port 3000)

server {
    listen 80;
    listen [::]:80;
    server_name nimalsafari.com www.nimalsafari.com;

    location / {
        return 301 https://nimalsafari.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nimalsafari.com www.nimalsafari.com;

    # Certbot will fill these after: certbot --nginx -d nimalsafari.com -d www.nimalsafari.com
    # ssl_certificate /etc/letsencrypt/live/nimalsafari.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/nimalsafari.com/privkey.pem;

    client_max_body_size 10M;

    location / {
        # Must match PORT in .env (default 3010 — leave 3000 for other apps)
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
